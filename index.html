<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AR Model</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      font-family: sans-serif;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #f2f2f2;
    }

    .title {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.85);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="title">
    画面を動かしてモデルを見てください。ARボタンを押すと現実空間に表示できます。
  </div>

  <model-viewer
    src="model.glb"
    ios-src="model.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="3D model">
  </model-viewer>
</body>
</html>
